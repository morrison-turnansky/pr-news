# PR Review Filter Configuration

# GitHub repository to analyze
repository: "pytorch/pytorch"

# Path to pre-filtered CSV (from export_prs.py)
input_csv_path: "filtered_prs.csv"

# Diff reduction settings
diff_reduction:
  # Maximum lines in reduced diff
  max_lines: 1000
  # Directories to include (all others excluded)
  priority_dirs:
    - "torch/_dynamo"
    - "torch/_inductor"

# Claude model parameters
model_params:
  # Sampling temperature (0.0-1.0, lower = more conservative)
  temperature: 0.2
  # Max response tokens
  max_tokens: 2000

# Skill file paths (absolute paths for shared skills, relative for repo-local)
skill_paths:
  - "/workspaces/pytorch-devcontainers/.claude/skills/pytorch-dynamo.md"
  - "/workspaces/pytorch-devcontainers/.claude/skills/pytorch-inductor.md"
  - "skills/pr_critique.md"  # Repo-local skill

# Enable self-check validation pass (reduces false positives)
self_check_enabled: true

# Optional filters
date_range_days: 7
exclude_labels: []
min_diff_lines: 10
